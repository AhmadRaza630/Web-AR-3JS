<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Food AR Screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050816;
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 20px;
      margin: 0;
    }
    .subtitle {
      margin: 0;
      font-size: 13px;
      color: #9ca3af;
    }
    .back-link {
      font-size: 13px;
      color: #a5b4fc;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(129, 140, 248, 0.4);
      background: rgba(15, 23, 42, 0.9);
    }
    .back-link:hover {
      background: rgba(30, 64, 175, 0.7);
    }
    model-viewer {
      width: 100%;
      height: 420px;
      border-radius: 16px;
      overflow: hidden;
      background: radial-gradient(circle at top, #1f2937, #020617);
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #ar-btn {
      background: #22c55e;
      color: #022c22;
    }
    #reset-btn {
      background: #111827;
      color: #e5e7eb;
    }
    #add-to-cart-btn {
      background: linear-gradient(to right, #f97316, #ea580c);
      color: #fff;
    }
    #add-to-cart-btn.added {
      background: #16a34a;
    }
    .add-to-cart-msg {
      margin-top: 8px;
      font-size: 13px;
      color: #86efac;
      text-align: center;
    }
    footer {
      padding: 8px 0 12px;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div>
        <h1>Food Web AR Viewer</h1>
        <p class="subtitle">Android Chrome ya iPhone Safari se open karein, phir "View in AR" dabayein.</p>
      </div>
      <a href="index.html" class="back-link">← Home pe wapas</a>
    </header>

    <!-- Yahan apna model.glb / model.usdz use karein -->
    <model-viewer
      id="viewer"
      src="Burger.glb"
      ios-src="mug.usdz"
      ar
      ar-modes="scene-viewer quick-look webxr"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      alt="3D food model"
    >
    </model-viewer>

    <div class="actions">
      <button id="ar-btn">
        View in AR
      </button>
      <button id="reset-btn">
        Reset view
      </button>
      <button id="add-to-cart-btn">
        Add to Cart
      </button>
    </div>
    <p class="add-to-cart-msg" id="add-to-cart-msg" style="display: none;"></p>
  </div>

  <footer>
    Agar AR na khule to ensure karein: HTTPS + Android Chrome ya iOS Safari + AR supported device.
  </footer>

  <script>
    const CART_KEY = 'foodar_cart';
    const ITEMS = {
      burger: { id: 'burger', name: 'Cheese Burger', price: 850, emoji: '🍔', model: 'Burger.glb' },
      pizza:  { id: 'pizza',  name: 'Loaded Pizza',  price: 1290, emoji: '🍕', model: 'Pizza.glb' },
      fries: { id: 'fries',  name: 'Crispy Fries',  price: 490, emoji: '🍟', model: 'Fries.glb' }
    };
    const params = new URLSearchParams(window.location.search);
    const itemKey = (params.get('item') || 'burger').toLowerCase();
    const currentItem = ITEMS[itemKey] || ITEMS.burger;

    const viewer = document.getElementById('viewer');
    const arBtn = document.getElementById('ar-btn');
    const resetBtn = document.getElementById('reset-btn');
    const addToCartBtn = document.getElementById('add-to-cart-btn');
    const addToCartMsg = document.getElementById('add-to-cart-msg');

    // Select correct 3D model based on URL item (burger/pizza/fries)
    if (currentItem && currentItem.model) {
      viewer.src = currentItem.model;
    }

    function getCart() {
      try {
        const raw = localStorage.getItem(CART_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (_) {
        return [];
      }
    }
    function saveCart(items) {
      localStorage.setItem(CART_KEY, JSON.stringify(items));
    }

    arBtn.addEventListener('click', () => {
      if (viewer.canActivateAR) {
        viewer.activateAR();
      } else {
        alert('Is device/browser par AR available nahi hai.');
      }
    });

    resetBtn.addEventListener('click', () => {
      viewer.cameraOrbit = 'auto';
      viewer.cameraTarget = 'auto';
    });

    addToCartBtn.addEventListener('click', () => {
      const cart = getCart();
      cart.push({ id: currentItem.id, name: currentItem.name, price: currentItem.price, emoji: currentItem.emoji });
      saveCart(cart);
      addToCartBtn.textContent = 'Added!';
      addToCartBtn.classList.add('added');
      addToCartMsg.textContent = currentItem.emoji + ' ' + currentItem.name + ' cart me add ho gaya.';
      addToCartMsg.style.display = 'block';
      setTimeout(() => {
        addToCartBtn.textContent = 'Add to Cart';
        addToCartBtn.classList.remove('added');
        addToCartMsg.style.display = 'none';
      }, 2000);
    });
  </script>
</body>
</html>
